name: CI
on:
  push:
    branches:
      - main
    tags:
      - '*.*.*' # semver, will override latest
      - '*-preview' # preview, won't override latest
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint sources
        run: |
          make lint
          npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm


      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - run: npm ci

      - name: Execute tests
        run: |
          make test
          make test-integration
          npm test
          make coverage

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - id: extract_ref
        run: echo "GIT_REF=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - run: npm ci

      - name: Build
        run: |
          make VERSION=${{ steps.extract_ref.outputs.GIT_REF }} RELEASE=1 release
          make VERSION=${{ steps.extract_ref.outputs.GIT_REF }} build-docker
          make VERSION=${{ steps.extract_ref.outputs.GIT_REF }} start-docker

      - if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: smocker-bin
          path: ./build/smocker.tar.gz

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright non-regression suite
        run: make test-e2e

  deploy:
    needs: [lint, test, build, e2e]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - id: extract_ref
        run: echo "GIT_REF=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: smocker-bin
          path: ./build

      - run: cd build && tar -xvf smocker.tar.gz

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy on Docker registry
        run: make VERSION=${{ steps.extract_ref.outputs.GIT_REF }} deploy-docker

      - name: Deploy on GitHub releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/smocker.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
