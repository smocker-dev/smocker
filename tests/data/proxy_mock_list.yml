- request:
    path: /posts/1
  proxy:
    host: https://jsonplaceholder.typicode.com
- request:
    path: /todos
    query_params:
      userId: "1"
  proxy:
    host: https://jsonplaceholder.typicode.com
- request:
    path: /redirect-to
  proxy:
    host: http://localhost:8090
- request:
    path: /redirect-to
    headers:
      X-Follow-Redirect: "true"
  proxy:
    host: http://localhost:8090
    follow_redirect: true
- request:
    path: /get
  proxy:
    host: http://localhost:8090
- request:
    path: /get
    headers:
      X-Keep-Host: "true"
  proxy:
    host: http://localhost:8090
    keep_host: true
- request:
    path: /headers
  proxy:
    host: http://localhost:8090
    headers:
      custom: "foobar"
      multi:
        - "foo"
        - "baz"
- request:
    method: GET
    headers:
      X-Filter: badssl
      X-Value: insecure
  proxy:
    host: https://self-signed.badssl.com
    skip_verify_tls: true
- request:
    method: GET
    headers:
      X-Filter: badssl
      X-Value: secure
  proxy:
    host: https://self-signed.badssl.com
    skip_verify_tls: false
