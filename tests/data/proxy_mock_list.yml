- request:
    path: /posts/1
  proxy:
    host: https://jsonplaceholder.typicode.com
- request:
    path: /todos
    query_params:
      userId: "1"
  proxy:
    host: https://jsonplaceholder.typicode.com
- request:
    path: /users/1
  proxy:
    host: https://jsonplaceholder.typicode.com
- request:
    path: /users/2
    headers:
      X-Keep-Host: "true"
  proxy:
    host: https://jsonplaceholder.typicode.com
    keep_host: true
- request:
    path: /albums/1
  proxy:
    host: https://jsonplaceholder.typicode.com
    headers:
      custom: "foobar"
      multi:
        - "foo"
        - "baz"
- request:
    method: GET
    headers:
      X-Filter: badssl
      X-Value: insecure
  proxy:
    host: https://self-signed.badssl.com
    skip_verify_tls: true
- request:
    method: GET
    headers:
      X-Filter: badssl
      X-Value: secure
  proxy:
    host: https://self-signed.badssl.com
    skip_verify_tls: false
