- request:
    path:
        matcher: ShouldEqual
        value: /test
    method:
        matcher: ShouldMatch
        value: .*
  response:
    body: |
        {"message": "test"}
    status: 0
    headers:
        Content-Type:
            - application/json
- request:
    path:
        matcher: ShouldEqual
        value: /encoded%2Fpath
    method:
        matcher: ShouldMatch
        value: .*
  response:
    body: |
        {"message": "encoded path"}
    status: 0
    headers:
        Content-Type:
            - application/json
- request:
    path:
        matcher: ShouldEqual
        value: /test
    method:
        matcher: ShouldEqual
        value: POST
  response:
    body: |
        {"message": "test2"}
    status: 0
    delay:
        min: 10ms
        max: 10ms
    headers:
        Content-Type:
            - application/json
- request:
    path:
        matcher: ShouldEqual
        value: /test
    method:
        matcher: ShouldEqual
        value: DELETE
  response:
    body: |
        {"message": "test3"}
    status: 0
    delay:
        max: 10ms
    headers:
        Content-Type:
            - application/json
- request:
    path:
        matcher: ShouldEqual
        value: /test
    method:
        matcher: ShouldMatch
        value: .*
    query_params:
        foo:
            - matcher: ShouldEqual
              value: bar
            - {matcher: ShouldEqual, value: baz}
  response:
    body: |
        {"message": "test4"}
    status: 0
    headers:
        Content-Type:
            - application/json
- request:
    path:
        matcher: ShouldEqual
        value: /test
    method:
        matcher: ShouldMatch
        value: .*
    headers:
        X-Custom-Header:
            - matcher: ShouldEqual
              value: bar
  response:
    body: |
        {"message": "test5"}
    status: 0
    headers:
        Content-Type:
            - application/json
- request:
    path:
        matcher: ShouldEqual
        value: /test
    method:
        matcher: ShouldMatch
        value: .*
    headers:
        X-Custom-Header-1:
            - matcher: ShouldEqual
              value: bar
        X-Custom-Header-2: [{matcher: ShouldEqual, value: foo}, {matcher: ShouldEqual, value: bar}]
        X-Custom-Header-3: [{matcher: ShouldEqual, value: foo}, {matcher: ShouldEqual, value: bar}, {matcher: ShouldMatch, value: baz.*}]
  response:
    body: |
        {"message": "test6"}
    status: 0
    headers:
        Content-Type:
            - application/json
